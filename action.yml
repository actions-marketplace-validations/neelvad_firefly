name: 'Firefly Numerical Parity Check'
description: >-
  CI gate for ML model deployments. Diffs a candidate model's per-layer
  activations against a calibrated reference, attributes the first
  divergence to a specific tap point, and fails the build if anything
  exceeds tolerance.

inputs:
  reference:
    description: >-
      Reference artifact location. Accepts a local path inside the
      workspace, an HF Hub URI (hf://org/repo[@rev][/subpath]), or a
      cloud URI: s3://bucket/prefix, gs://bucket/prefix, or
      az://account/container/prefix. Cloud backends need their extra
      installed on the runner (`pip install 'firefly[s3]'` /
      `'firefly[gcs]'` / `'firefly[azure]'`).
    required: true
  candidate:
    description: 'HuggingFace model ID or local path to the candidate checkpoint.'
    required: true
  inputs:
    description: >-
      Path to the golden-inputs JSON file. Must be the same file used at
      capture time (different inputs would compare against a different
      reference trajectory).
    required: true
  device:
    description: "Device for the forward pass. 'cpu' (default) or 'cuda'."
    default: 'cpu'
    required: false
  max-rel-error:
    description: >-
      Optional global ceiling on relative error per tap. Effective atol
      becomes max(calibrated, max-rel-error × max|ref|). 0 means no
      ceiling — calibrated tolerances alone gate the check.
    default: '0'
    required: false
  allow-fingerprint-mismatch:
    description: >-
      'true' to proceed even when the candidate's model weights differ
      from what the reference manifest recorded. Default 'false' (refuse,
      because that almost always means the reference is stale).
    default: 'false'
    required: false
  python-version:
    description: 'Python version to install before running Firefly.'
    default: '3.11'
    required: false
  firefly-extras:
    description: >-
      Optional extras to install with Firefly, for cloud-hosted references.
      Set to the comma-separated extras matching your reference URI scheme:
      's3' for s3://, 'gcs' for gs://, 'azure' for az:// (e.g. 's3' or
      's3,gcs'). Leave empty for local or hf:// references. Use 'torchao'
      for mode 'quant-diff'.
    default: ''
    required: false
  mode:
    description: >-
      'check' (default): per-layer numerical-parity gate. 'quant-diff': rank a
      torchao-quantized candidate's per-layer divergence vs the fp baseline and
      fail if it exceeds rel-threshold — the attribution-guided quantization
      gate. 'quant-diff' needs the 'torchao' extra (set firefly-extras).
    default: 'check'
    required: false
  scheme:
    description: >-
      quant-diff only: torchao scheme — 'w8a8' (CPU/GPU) or 'int4wo' (needs a
      CUDA runner).
    default: 'w8a8'
    required: false
  rel-threshold:
    description: >-
      quant-diff only: fail if any tap's mean relative divergence exceeds this
      fraction (e.g. 0.05 = 5%). 0 reports without failing.
    default: '0'
    required: false
  group-size:
    description: 'quant-diff only: int4wo group size.'
    default: '32'
    required: false
  comment-on-pr:
    description: >-
      'true' (default) to post the markdown summary as a comment on the PR
      (pull_request events only; no-op otherwise). The calling workflow must
      grant `permissions: pull-requests: write`. A failure to post is a warning,
      never a build failure.
    default: 'true'
    required: false
  github-token:
    description: >-
      Token for posting the PR comment. Defaults to the workflow's
      github.token; override with a PAT for cross-repo / elevated posting.
    default: ''
    required: false

outputs:
  first-divergent-tap:
    description: >-
      Name of the tap where divergence first appears in forward order
      (empty string if no divergence). Use this for downstream steps
      (slack notifications, comment formatting, etc).
    value: ${{ steps.check.outputs.first-divergent-tap }}
  passed:
    description: "'true' if all taps within tolerance, 'false' otherwise."
    value: ${{ steps.check.outputs.passed }}
  report-path:
    description: 'Path to the JSON report (firefly-report.json in the workspace).'
    value: ${{ steps.check.outputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Firefly
      shell: bash
      run: |
        python -m pip install --upgrade pip
        EXTRAS="${{ inputs.firefly-extras }}"
        if [[ -n "$EXTRAS" ]]; then
          python -m pip install "${{ github.action_path }}[$EXTRAS]"
        else
          python -m pip install "${{ github.action_path }}"
        fi

    - name: Run firefly
      id: check
      shell: bash
      run: |
        set +e
        if [[ "${{ inputs.mode }}" == "quant-diff" ]]; then
          firefly quant-diff \
            --reference "${{ inputs.reference }}" \
            --candidate "${{ inputs.candidate }}" \
            --inputs "${{ inputs.inputs }}" \
            --device "${{ inputs.device }}" \
            --scheme "${{ inputs.scheme }}" \
            --group-size "${{ inputs.group-size }}" \
            --rel-threshold "${{ inputs.rel-threshold }}" \
            --report-json firefly-report.json \
            --ci-format markdown \
            > firefly-summary.md
        elif [[ "${{ inputs.mode }}" == "check" ]]; then
          FLAGS=()
          if [[ "${{ inputs.allow-fingerprint-mismatch }}" == "true" ]]; then
            FLAGS+=(--allow-fingerprint-mismatch)
          fi
          firefly check \
            --reference "${{ inputs.reference }}" \
            --candidate "${{ inputs.candidate }}" \
            --inputs "${{ inputs.inputs }}" \
            --device "${{ inputs.device }}" \
            --max-rel-error "${{ inputs.max-rel-error }}" \
            --report-json firefly-report.json \
            --ci-format markdown \
            "${FLAGS[@]}" \
            > firefly-summary.md
        else
          echo "::error::unknown mode '${{ inputs.mode }}' (expected 'check' or 'quant-diff')"
          exit 2
        fi
        EXIT=$?
        cat firefly-summary.md >> "$GITHUB_STEP_SUMMARY"
        FIRST_DIV=$(python -c "import json,sys; d=json.load(open('firefly-report.json')); print(d.get('first_divergent_tap') or '')" 2>/dev/null || echo "")
        {
          echo "first-divergent-tap=$FIRST_DIV"
          if [[ $EXIT -eq 0 ]]; then echo "passed=true"; else echo "passed=false"; fi
          echo "report-path=$(pwd)/firefly-report.json"
        } >> "$GITHUB_OUTPUT"
        exit $EXIT

    - name: Comment on PR
      # Runs even when the check failed (always()) — failing the build is
      # exactly when the comment matters most. Posting errors degrade to a
      # warning so a missing 'pull-requests: write' permission never fails CI.
      if: ${{ always() && inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        if [[ ! -f firefly-summary.md ]]; then
          echo "no firefly-summary.md to post"; exit 0
        fi
        # Sticky: update this author's last comment if present, else create.
        gh pr comment "$PR_NUMBER" --body-file firefly-summary.md --edit-last 2>/dev/null \
          || gh pr comment "$PR_NUMBER" --body-file firefly-summary.md \
          || echo "::warning title=Firefly::could not post PR comment (grant the workflow 'permissions: pull-requests: write')"

branding:
  icon: 'check-circle'
  color: 'purple'
