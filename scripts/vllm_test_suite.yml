# Reproducible vLLM parity test matrix.
#
# Each test declares two reference dirs to diff and an expected outcome.
# The runner (scripts/run_vllm_suite.py) reads this file, computes the
# diff between each pair, and reports pass/fail vs the expectation in a
# markdown summary.
#
# Reference dirs are captured at:
#   dtype:  bfloat16
#   prompt: "the quick brown fox jumps over the lazy dog" (unless noted)
#   tool:   scripts/capture_vllm.py
# with the model and GPU varying per test. SmolLM-135M runs on A10G;
# 7B+ models (Llama, Qwen, Mistral) on A100-40GB with --gpu-memory-utilization 0.7.
#
# Add a new test by appending an entry. Add a new vLLM version, attention
# backend, or engine by extending scripts/capture_vllm.py first, capturing,
# then declaring the new pair here.

suite_name: "vLLM 0.8.5 inference parity matrix (BF16, multi-model)"

tests:
  - name: "cross-version (V0, auto backend)"
    description: "vLLM 0.7.3 vs 0.8.5 with default backend on V0 engine — V0 forward path stable across releases."
    reference_a: scripts/results/vllm_run_a
    reference_b: scripts/results/vllm_0_7_3
    expected: bit_equal

  - name: "cross-engine (auto backend)"
    description: "vLLM 0.8.5 V0 vs V1 — engine architecture rewrite doesn't perturb prefill numerics on default backend."
    reference_a: scripts/results/vllm_run_a
    reference_b: scripts/results/vllm_0_8_5_v1
    expected: bit_equal

  - name: "cross-engine (FLASH_ATTN)"
    description: "vLLM 0.8.5 V0 vs V1, both with FLASH_ATTN — confirms kernel choice (not engine) is the numerical variable."
    reference_a: scripts/results/vllm_0_8_5_flash
    reference_b: scripts/results/vllm_0_8_5_v1_flash
    expected: bit_equal

  - name: "cross-backend (FLASH_ATTN vs XFORMERS, prefill)"
    description: "Headline divergence: same vLLM version, different attention kernel — layer.7.self_attn is the first divergent tap."
    reference_a: scripts/results/vllm_0_8_5_flash
    reference_b: scripts/results/vllm_0_8_5_xformers
    expected:
      first_divergence: layer.7.self_attn
      n_divergent_min: 70

  - name: "multi-request batching (V0 vs V1, n_prompts=2)"
    description: "V0's BatchManager packs both prompts into a single 18-token forward pass; V1's continuous-batching scheduler processes them as two separate 9-token forward passes. Firefly surfaces this via the captured tensor shape — a per-tap diff isn't even computable, which is itself the finding."
    reference_a: scripts/results/vllm_v0_flash_x2
    reference_b: scripts/results/vllm_v1_flash_x2
    expected: shape_mismatch

  - name: "cross-engine (FLASH_ATTN, 300-token prompt)"
    description: "Headline long-prompt finding. At 9 tokens V0 and V1 are bit-equal under FLASH_ATTN; at 300 tokens (past 18+ PagedAttention block boundaries) they diverge at every tap. The only variable is the engine — exactly the knob production users flip on a vLLM upgrade. A short-prompt unit test would PASS this comparison; a 300-token prompt does not."
    reference_a: scripts/results/vllm_v0_flash_long270
    reference_b: scripts/results/vllm_v1_flash_long270
    expected:
      first_divergence: layer.0.self_attn
      n_divergent_min: 91  # all of them — strict equality is also valid

  - name: "cross-backend (FLASH_ATTN vs XFORMERS, decode 8 tokens)"
    description: "Decode capture: KV cache pollution moves the first divergence from layer.7 (in prefill-only mode) all the way back to layer.0.self_attn at token_0 — even layer 0 reads from a polluted cache during decode."
    reference_a: scripts/results/vllm_v0_flash_decode8
    reference_b: scripts/results/vllm_v0_xformers_decode8
    expected:
      # In forward order, every layer-0 position comes before any layer-1
      # position. layer.0.self_attn@prefill is bit-equal (early layers don't
      # diverge at prefill), but layer.0.self_attn@token_0 sees a polluted
      # KV cache and is the first divergent tap.
      first_divergence: layer.0.self_attn@token_0
      # Lower bound — actual is ~700 of 728. Pinning a specific number
      # would make this test brittle to upstream vLLM changes that
      # legitimately move the boundary.
      n_divergent_min: 600

  # --- cross-family checks (drives Finding 1.5 retraction + Finding 4 universality) -----

  - name: "Qwen-2.5-7B FLASH_ATTN vs XFORMERS"
    description: "Cross-family test of the Finding 1.5 universality claim. On Meta models (SmolLM, Llama) FLASH vs XFORMERS first-divergence is layer.7.self_attn. On Qwen-2.5-7B it shifts to layer.0.self_attn — the within-Meta universality does NOT hold across families. Most likely driver: vLLM's XFORMERS backend takes a different RoPE-handling code path for Qwen's theta=1000000 vs Llama's theta=500000+rope_scaling."
    reference_a: scripts/results/qwen_v0_flash_short
    reference_b: scripts/results/qwen_v0_xformers_short
    expected:
      first_divergence: layer.0.self_attn
      n_divergent_min: 80  # actual 85/85

  - name: "Mistral-7B-v0.1 FLASH_ATTN vs XFORMERS"
    description: "Same cross-family test on Mistral. Confirms the Qwen result isn't a Qwen quirk — Mistral also shifts to layer.0.self_attn first-divergence, so the within-Meta layer-7 universality breaks at TWO different architecture families."
    reference_a: scripts/results/mistral_v0_flash_short
    reference_b: scripts/results/mistral_v0_xformers_short
    expected:
      first_divergence: layer.0.self_attn
      n_divergent_min: 90  # actual 97/97

  - name: "Llama-3.1-8B FLASH_ATTN vs FLASHINFER"
    description: "Drives blog Finding 4. FLASH vs FLASHINFER per-element kernel diff is ~520× larger than FLASH vs XFORMERS at layer 0, so it crosses BF16's representable threshold immediately. Layer.0.self_attn is the first divergent tap, ~0.05% rel; final-norm ~1.3%."
    reference_a: scripts/results/llama_v0_flash_short
    reference_b: scripts/results/llama_v0_flashinfer_short
    expected:
      first_divergence: layer.0.self_attn
      n_divergent_min: 90  # actual 97/97

  - name: "Qwen-2.5-7B FLASH_ATTN vs FLASHINFER (Finding 5 anomaly)"
    description: "Through Qwen layers 0-26, FLASH vs FLASHINFER tracks the other models closely (gradual climb to ~1.2% by layer 26). At Qwen's final layer 27, the relative error spikes 20× to 22.83% final-norm — driven by Qwen's outlier-feature concentration at depth (max-abs activation magnitude 252, largest of any model tested). Production-relevant catch for any Qwen-on-FLASHINFER serving stack."
    reference_a: scripts/results/qwen_v0_flash_short
    reference_b: scripts/results/qwen_v0_flashinfer_short
    expected:
      first_divergence: layer.0.self_attn
      n_divergent_min: 80  # actual 85/85

  - name: "Mistral-7B-v0.1 FLASH_ATTN vs FLASHINFER"
    description: "Confirms FLASHINFER layer-0 universality across all 4 models. Mistral's curve sits at ~1.2% final-norm rel — similar to Llama, no catastrophic final-layer spike (Mistral spreads its outlier features across 32 layers rather than concentrating in the final 1-2)."
    reference_a: scripts/results/mistral_v0_flash_short
    reference_b: scripts/results/mistral_v0_flashinfer_short
    expected:
      first_divergence: layer.0.self_attn
      n_divergent_min: 90  # actual 97/97
