name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        # CPU-installable extras only. vllm/sglang are GPU-only (heavy/often
        # unbuildable on CPU runners) and the fast suite doesn't need them —
        # the runner seam is exercised via HF; vllm/sglang are validated on
        # Modal GPUs, not here.
        run: uv sync --extra dev --extra torchao --extra s3 --extra gcs --extra azure

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v
