name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        # CPU-installable extras only. vllm/sglang are GPU-only (heavy/often
        # unbuildable on CPU runners) and the fast suite doesn't need them —
        # the runner seam is exercised via HF; vllm/sglang are validated on
        # Modal GPUs, not here.
        run: uv sync --extra dev --extra torchao --extra s3 --extra gcs --extra azure

      - name: Lint
        run: uv run ruff check .

      - name: Check version consistency
        # pyproject and __init__ must agree so a release tag can't ship a
        # stale __version__ (release.yml re-checks both against the tag).
        run: |
          PYPROJECT=$(uv run python -c \
            "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(uv run python -c "import firefly; print(firefly.__version__)")
          if [ "$PYPROJECT" != "$INIT" ]; then
            echo "::error::pyproject version $PYPROJECT != firefly.__version__ $INIT"
            exit 1
          fi

      - name: Test
        run: uv run pytest -v
